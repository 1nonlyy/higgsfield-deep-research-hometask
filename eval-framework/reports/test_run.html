<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eval Report</title>
  <style>
    :root{
      --bg: #0b1020;
      --panel: #0f1733;
      --panel2: #0c132b;
      --text: #e7ecff;
      --muted: #a9b4da;
      --border: rgba(255,255,255,0.10);
      --green: #2bd576;
      --red: #ff4d4d;
      --yellow: #ffd166;
      --chip: rgba(255,255,255,0.08);
      --code: #0a0f1f;
      --shadow: 0 14px 40px rgba(0,0,0,0.45);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{ box-sizing: border-box; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background: radial-gradient(1200px 800px at 20% 0%, rgba(69,117,255,0.18), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, rgba(43,213,118,0.10), transparent 55%),
                  var(--bg);
      height: 100vh;
      overflow: hidden;
    }
    .app{
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
    }
    .sidebar{
      border-right: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 30%), var(--panel2);
      padding: 14px 12px;
      overflow: auto;
    }
    .header{
      display:flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 6px 10px;
    }
    .header h1{
      font-size: 14px;
      margin:0;
      letter-spacing: 0.2px;
      color: var(--text);
    }
    .header .meta{
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .search{
      width: 100%;
      margin: 8px 6px 12px;
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--panel2);
      padding-top: 8px;
    }
    .search input{
      width: 100%;
      padding: 10px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.25);
      color: var(--text);
      outline: none;
    }
    .case-list{
      display:flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 6px 14px;
    }
    .case{
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 10px;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      box-shadow: 0 0 0 rgba(0,0,0,0);
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }
    .case:hover{
      transform: translateY(-1px);
      box-shadow: var(--shadow);
      border-color: rgba(255,255,255,0.20);
    }
    .case.active{
      border-color: rgba(69,117,255,0.55);
      background: rgba(69,117,255,0.08);
    }
    .case-top{
      display:flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .badge{
      font-size: 12px;
      font-weight: 650;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--border);
    }
    .badge.pass{ color: var(--green); border-color: rgba(43,213,118,0.35); background: rgba(43,213,118,0.08);}
    .badge.fail{ color: var(--red); border-color: rgba(255,77,77,0.35); background: rgba(255,77,77,0.07);}
    .badge.flaky{ color: var(--yellow); border-color: rgba(255,209,102,0.45); background: rgba(255,209,102,0.10);}
    .case-id{
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      word-break: break-word;
      line-height: 1.2;
    }
    .case-sub{
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip{
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
    }

    .main{
      padding: 16px 18px 18px;
      overflow: auto;
    }
    .panel{
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 40%), var(--panel);
      border-radius: 16px;
      padding: 14px 14px;
      box-shadow: var(--shadow);
    }
    .case-title{
      display:flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .case-title h2{
      margin:0;
      font-size: 14px;
      letter-spacing: 0.2px;
      font-family: var(--mono);
    }
    .case-title .right{
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .assertions{
      margin: 10px 0 14px;
      padding: 10px 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(0,0,0,0.18);
    }
    .assertions h3{
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }
    .assertion{
      display:flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 6px;
      border-radius: 10px;
    }
    .assertion.fail{
      background: rgba(255,77,77,0.08);
      border: 1px solid rgba(255,77,77,0.20);
    }
    .assertion.pass{
      background: rgba(43,213,118,0.06);
      border: 1px solid rgba(43,213,118,0.16);
    }
    .assertion .mark{
      font-family: var(--mono);
      width: 20px;
      text-align:center;
      margin-top: 1px;
    }
    .assertion .text{
      font-size: 12px;
      color: var(--text);
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
      flex: 1;
    }

    .timeline{
      display:flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    .step{
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
    }
    .step .step-head{
      display:flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(0,0,0,0.12);
    }
    .role{
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .step .body{
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .toolname{
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
    }
    details.tool{
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      background: rgba(0,0,0,0.12);
    }
    details.tool > summary{
      cursor: pointer;
      list-style: none;
      padding: 10px 12px;
      display:flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
    }
    details.tool > summary::-webkit-details-marker{ display:none; }
    .caret{
      color: var(--muted);
      font-size: 12px;
    }
    .kv{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 12px 12px;
    }
    .kv .box{
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      background: var(--code);
      overflow: hidden;
    }
    .kv .label{
      padding: 8px 10px;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    pre{
      margin:0;
      padding: 10px 10px;
      overflow: auto;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.4;
      color: #dbe3ff;
    }
    .empty{
      color: var(--muted);
      font-size: 13px;
      padding: 16px;
    }
    .hint{
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }
    @media (max-width: 960px){
      body{ overflow:auto; height:auto;}
      .app{ grid-template-columns: 1fr; height:auto;}
      .sidebar{ position: relative; height:auto; }
      .main{ height:auto; overflow: visible; }
      .kv{ grid-template-columns: 1fr; }
    }
  </style>
</head>

    <main class="main">
      <div class="panel" id="detailPanel">
        <div class="empty">Select a case on the left.</div>
      </div>
    </main>
  </div>

    function esc(s){
      return (s ?? "").toString()
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function buildAssertions(c){
      const items = (c.assertions ?? []);
      if(items.length === 0) return "";
      let html = `<div class="assertions"><h3>Assertions</h3>`;
      for(const a of items){
        const ok = !!a.passed;
        const cls = ok ? "pass" : "fail";
        const mark = ok ? "✅" : "❌";
        const reason = esc(a.reason ?? "");
        html += `<div class="assertion ${cls}"><div class="mark">${mark}</div><div class="text">${reason}</div></div>`;
      }
      html += `</div>`;
      return html;
    }

    function buildTimeline(c){
      const steps = (c.timeline ?? []);
      if(steps.length === 0) return `<div class="empty">No trace messages for this case.</div>`;

      let out = `<div class="timeline">`;
      for(const s of steps){
        if(s.kind === "message"){
          const role = esc(s.role ?? "unknown");
          const text = esc(s.text ?? "");
          out += `
            <div class="step">
              <div class="step-head">
                <div class="role">${role}</div>
              </div>
              <div class="body">${text}</div>
            </div>`;
        } else if(s.kind === "tool"){
          const name = esc(s.name ?? "tool");
          const args = esc(s.args_json ?? "");
          const outp = esc(s.output_json ?? "");
          out += `
            <details class="tool step">
              <summary>
                <span class="toolname">tool: ${name}</span>
                <span class="caret">click to expand</span>
              </summary>
              <div class="kv">
                <div class="box">
                  <div class="label">inputs</div>
                  <pre>${args}</pre>
                </div>
                <div class="box">
                  <div class="label">outputs</div>
                  <pre>${outp}</pre>
                </div>
              </div>
            </details>`;
        }
      }
      out += `</div>`;
      return out;
    }

    function selectCase(caseId){
      const c = CASES.find(x => x.case_id === caseId);
      if(!c) return;

      for(const el of document.querySelectorAll(".case")){
        el.classList.toggle("active", el.getAttribute("data-case-id") === caseId);
      }

      const repeatBadges = [];
      if(c.repeat_label){
        repeatBadges.push(`<div class="badge" style="color: var(--muted); border-color: rgba(255,255,255,0.18);">${esc(c.repeat_label)}</div>`);
      }
      if(c.is_flaky){
        repeatBadges.push(`<div class="badge flaky">FLAKY</div>`);
      }
      const badge = c.passed ? `<div class="badge pass">PASS</div>` : `<div class="badge fail">FAIL</div>`;
      const reason = (!c.passed && c.failure_reason) ? `<span class="chip" style="border-color: rgba(255,77,77,0.35); background: rgba(255,77,77,0.06); color: #ffd6d6;">${esc(c.failure_reason)}</span>` : "";

      const header = `
        <div class="case-title">
          <div style="display:flex; align-items:center; gap:10px; flex-wrap: wrap;">
            <h2>${esc(c.case_id)}</h2>
            ${repeatBadges.join("")}
            ${badge}
            ${reason}
          </div>
          <div class="right">
            <span class="chip">lat ${esc(c.wall_time_ms)}ms</span>
            <span class="chip">tools ${esc(c.tool_call_count)}</span>
            <span class="chip">cost $${esc((c.cost_usd ?? 0).toFixed(4))}</span>
          </div>
        </div>
      `;

      const assertions = buildAssertions(c);
      const timeline = buildTimeline(c);

      document.getElementById("detailPanel").innerHTML = header + assertions + timeline;
      window.location.hash = encodeURIComponent(caseId);
    }

    function applyFilter(q){
      const query = (q ?? "").trim().toLowerCase();
      for(const el of document.querySelectorAll(".case")){
        const hay = (el.getAttribute("data-search") ?? "");
        const ok = !query || hay.includes(query);
        el.style.display = ok ? "" : "none";
      }
    }

    document.getElementById("search").addEventListener("input", (e) => {
      applyFilter(e.target.value);
    });

    // On load: select first case, or hash.
    (function(){
      const fromHash = decodeURIComponent((window.location.hash || "").replace(/^#/, ""));
      if(fromHash){
        selectCase(fromHash);
        return;
      }
      if(CASES.length > 0) selectCase(CASES[0].case_id);
    })();
  </script>
</body>
</html>
